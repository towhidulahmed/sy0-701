services:
  - type: web
    name: security-exam
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/var/data/dev.db
    disk:
      name: security-exam-data
      mountPath: /var/data
      sizeGB: 1
